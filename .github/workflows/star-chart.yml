name: star-chart

on:
  schedule:
    - cron: "20 21 * * *" # 每天北京时间 05:20
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render star history SVG
        env:
          # GitHub 2026-07 起 stargazers 端点仅限 owner/协作者个人凭证,
          # Actions 安装令牌已被排除(403) → 优先用仓库 secret STAR_TOKEN
          # (fine-grained PAT, 仅本仓库 + Metadata:Read-only)
          GITHUB_TOKEN: ${{ secrets.STAR_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 scripts/star_chart.py docs/star-history.svg
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/star-history.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh star history chart"
            git push
          fi
